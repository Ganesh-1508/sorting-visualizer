<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Visualizer with Numbered Bars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="p-3">
    <div class="container-fluid">
        <h1 class="text-center mb-2">Sorting Algorithm Visualizer</h1>
        <div class="row">
            <div class="col-md-4 d-flex flex-column gap-3 border border-dark p-3" id="tool">
                <div>
                    <label for="customArray" class="form-label">Enter Array (e.g., 10,5,3,8)</label>
                    <input type="text" class="form-control" id="customArray" placeholder="Comma-separated numbers (5-50 values, 1-1000)">
                    <p id="errorMsg" class="text-danger mt-1" style="display: none;"></p>
                </div>
                <div>
                    <label for="algorithm" class="form-label">Select Algorithm</label>
                    <select id="algorithm" class="form-select">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="merge">Merge Sort</option>
                        <option value="quick">Quick Sort</option>
                    </select>
                </div>
               <div class="d-flex flex-wrap gap-3">
    <button class="btn btn-primary" onclick="generateArray()">Generate Array</button>
    <button class="btn btn-success" id="startBtn" onclick="startSort()">Start Sort</button>
    <button class="btn btn-warning" id="pauseBtn" onclick="pauseSort()" disabled>Pause</button>
    <button class="btn btn-danger" onclick="resetSort()">Reset</button>
    <button class="btn btn-info" id="replayBtn" onclick="replaySort()" disabled>Replay</button>
    <button class="btn btn-secondary" id="nextBtn" onclick="nextStep()" disabled>Next Step</button>
    <button class="btn btn-secondary" id="prevBtn" onclick="prevStep()" disabled>Previous Step</button>
    <button class="btn btn-primary" id="manualBtn" onclick="startManualSort()">Start Manual Sort</button>
</div>
            </div>
            
            <div class="col-md-8">
                <svg id="svg" width="800" height="400" class="border border-dark mx-auto d-block"></svg>
                <div class="mt-3 text-center" id="metric" role="region" aria-label="Metrics and array status"> <h4>Metrics:</h4> <!-- Array status inside the Metrics box --> <div id="array-status" class="mb-2"> <p class="mb-1"><strong>Before Sorting:</strong> <span id="beforeArray">-</span></p> <p class="mb-1"><strong>After Sorting:</strong> <span id="afterArray">-</span></p> </div> <!-- Existing metrics --> <p id="metrics">Comparisons: 0 | Swaps: 0 | Time: 0ms</p> </div>
            </div>
        </div>
    </div>
    <!-- Offcanvas Sidebar for Algorithm Explanation -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="explanationSidebar" aria-labelledby="explanationSidebarLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="explanationSidebarLabel">Algorithm Explanation</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body" id="explanationContent">
            <!-- Explanation content will be populated here -->
        </div>
    </div>
     <!-- Toast Container -->
    <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
